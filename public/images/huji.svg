<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" width="120" height="110">
  <!-- Geometric "ino" / innovation mark logo -->
  <!-- Left cluster: teal/mint triangles -->
  <polygon points="10,85 28,85 19,55" fill="#2ABFBF"/>
  <polygon points="10,85 19,55 10,55" fill="#1A9090"/>
  <polygon points="19,55 28,85 28,55" fill="#45D4D4"/>
  <!-- Tall center-left shape: dark navy -->
  <rect x="34" y="20" width="18" height="65" fill="#1C2D6B"/>
  <polygon points="34,20 52,20 43,10" fill="#2A3E8A"/>
  <!-- Center diamond shapes: navy -->
  <polygon points="58,50 72,35 86,50 72,65" fill="#1C2D6B"/>
  <polygon points="60,50 72,37 84,50 72,63" fill="#2A3E8A"/>
  <!-- Right cluster: burgundy/red triangles -->
  <polygon points="92,85 110,85 101,55" fill="#8B1A2D"/>
  <polygon points="92,85 101,55 92,55" fill="#6B1020"/>
  <polygon points="101,55 110,85 110,55" fill="#A82840"/>
